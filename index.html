<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK하이닉스 100조 투자 대응 매트릭스</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #e67e22; --bg: #f0f2f5;
            --card: #ffffff; --border: #dcdde1; --text: #2f3640;
            --strong-buy: #eb4d4b; --buy: #2ecc71; --wait: #95a5a6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .alert-box { background: #ff7675; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.4; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.3rem; color: var(--primary); }

        .group-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .group-header { border-left: 6px solid var(--accent); padding-left: 12px; margin-bottom: 15px; }
        .group-header h2 { font-size: 1.1rem; color: var(--primary); }
        
        .item-list { display: flex; flex-direction: column; gap: 10px; }
        .item-row { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .item-top { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; background: white; }
        .corp-name { font-weight: bold; font-size: 1.05rem; }
        .hot-tag { background: #fab1a0; color: #d63031; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: 900; }
        .status-pill { font-size: 0.75rem; padding: 5px 12px; border-radius: 20px; color: white; font-weight: bold; }

        .item-content { display: none; padding: 15px; background: #f9f9f9; border-top: 1px solid var(--border); }
        .item-content.active { display: block; }
        
        .grid-data { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .data-box { background: white; border: 1px solid var(--border); padding: 8px; border-radius: 6px; text-align: center; }
        .label { font-size: 0.65rem; color: #7f8c8d; display: block; }
        .val { font-size: 0.9rem; font-weight: bold; }
        
        .why-box { background: #ecf0f1; padding: 12px; border-radius: 8px; font-size: 0.85rem; border-left: 4px solid var(--primary); }
        
        @media (max-width: 600px) { .grid-data { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div class="alert-box">
        <strong>🚨 핵심 투자 시그널:</strong> SK하이닉스 100조 Capex 집행 로직 반영. 
        청주 P&T7(첨단 패키징) 및 용인 1기 팹 선행 인프라 수혜주 중심으로 매트릭스를 재편했습니다.
    </div>

    <header class="header">
        <h1>🏗️ 산업 병목 추적 & 투자 매트릭스 v2.0</h1>
    </header>

    <div class="group-card">
        <div class="group-header"><h2>A. 디지털 고도화 (HBM 패키징 & 선단 공정)</h2></div>
        <div class="item-list" id="list-a"></div>
    </div>

    <div class="group-card">
        <div class="group-header"><h2>B. 물리적 인프라 (초대형 팹 전력 공급망)</h2></div>
        <div class="item-list" id="list-b"></div>
    </div>
    
    </div>

<script>
    const investmentData = {
        'list-a': [
            {n:"인텍플러스", hot:true, s:"강력 매수", v:"35.0 / 3.0", r:45, p:1.2, o:"+5.2%p", b:"1.8", l:"청주 P&T7(패키징 전용 팹) 19조 투자의 직접 수혜. 외관 검사 장비 쇼티지 예상."},
            {n:"티에스이", hot:true, s:"강력 매수", v:"48.0 / 2.5", r:52, p:1.1, o:"+6.3%p", b:"1.5", l:"하이닉스 WT(Wafer Test) 라인 7개층 증설의 최대 수혜. 테스트 소켓 공급 병목 발생 구간."},
            {n:"HPSP", hot:true, s:"즉시 진입", v:"45.0 / 12.0", r:55, p:1.4, o:"+50%", b:"2.1", l:"용인 1기 팹 EUV 선단 공정 필수 장비. 고압 수소 어닐링 독점력 기반 마진 극대화."},
            {n:"SK하이닉스", hot:false, s:"추세 추종", v:"20.2 / 1.8", r:65, p:0.9, o:"+15%p", b:"0.8", l:"100조 투자 주체. 1분기 영업이익 40조 기반의 압도적 현금 동원력 및 HBM 주도권."}
        ],
        'list-b': [
            {n:"HD현대일렉트릭", hot:true, s:"강력 매수", v:"30.1 / 5.2", r:65, p:1.2, o:"+4.5%p", b:"3.8", l:"용인 클러스터 600조 투자의 첫 단추인 초고압 변압기 독점 공급. 수주잔고 탄력 역대 최고."},
            {n:"LS마린솔루션", hot:true, s:"즉시 진입", v:"18.5 / 2.1", r:48, p:0.9, o:"+3.2%p", b:"2.5", l:"서해안/용인 전력망 연결 및 해상풍력 인프라 확대 수혜. 그룹 내 에너지 밸류체인 핵심."},
            {n:"LS", hot:false, s:"즉시 진입", v:"8.5 / 0.7", r:60, p:0.6, o:"+1.8%p", b:"1.5", l:"PBR 1.0 미만 저평가 메리트 + 전력망 확충에 따른 초고압 케이블 수주 가속화."}
        ]
    };

    function render() {
        for (const [id, items] of Object.entries(investmentData)) {
            const el = document.getElementById(id);
            if(!el) continue;
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-row';
                const color = item.s.includes('강력') ? 'var(--strong-buy)' : 'var(--buy)';
                
                card.innerHTML = `
                    <div class="item-top" onclick="this.nextElementSibling.classList.toggle('active')">
                        <div class="corp-name">${item.n} ${item.hot ? '<span class="hot-tag">HOT 수혜</span>' : ''}</div>
                        <div class="status-pill" style="background:${color}">${item.s}</div>
                    </div>
                    <div class="item-content">
                        <div class="grid-data">
                            <div class="data-box"><span class="label">PER/PBR</span><span class="val">${item.v}</span></div>
                            <div class="data-box"><span class="label">RSI</span><span class="val">${item.r}</span></div>
                            <div class="data-box"><span class="label">수주잔고</span><span class="val">${item.b}</span></div>
                        </div>
                        <div class="why-box"><strong>투자 로직:</strong> ${item.l}</div>
                    </div>
                `;
                el.appendChild(card);
            });
        }
    }
    render();
</script>
</body>
</html>
